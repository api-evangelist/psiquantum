aid: psiquantum
name: PsiQuantum
description: >-
  PsiQuantum is a Palo Alto, California photonic quantum computing company
  founded in 2016 by Jeremy O'Brien, Terry Rudolph, Pete Shadbolt, and Mark
  Thompson, building utility-scale, fault-tolerant quantum computers based on
  single-photon qubits at telecom wavelength. Its Omega chipset — a silicon
  photonic system integrating on-chip single-photon sources, superconducting
  nanowire single-photon detectors, barium-titanate optical switches, and
  low-loss fiber couplers — is manufactured on 300mm wafers at GlobalFoundries'
  flagship fab in Malta, NY, leveraging mature semiconductor processes rather
  than exotic cryogenic fabrication. The company is constructing two utility-
  scale, million-qubit, fault-tolerant quantum computing sites: one at Moreton
  Bay, Queensland, Australia (in partnership with the Australian and
  Queensland governments) and one at the Illinois Quantum and Microelectronics
  Park in Chicago, Illinois (with additional R&D at PsiLabs in Daresbury, UK
  and assembly at PsiFactory in Milpitas, CA). PsiQuantum exposes a developer
  surface aimed at fault-tolerant quantum algorithm researchers: Construct, an
  enterprise platform for FTQC algorithm development, resource analysis, and
  training; Circuit Designer, a free web tool for prototyping and visualizing
  fault-tolerant quantum circuits; Circuit Hub, a shared library of `.circuit`
  files; and two open-source Python projects on GitHub — Bartiq, a symbolic
  quantum resource estimator that compiles subroutine-level costs to global
  T-gate, Toffoli, qubit, and circuit-volume estimates, and QREF, an open
  JSON-Schema-based format for representing quantum algorithms as hierarchical
  DAGs with a Pydantic validation library and a `qref-render` visualization
  tool. NVIDIA's CUDA-Q is integrated into Construct for accelerated
  simulation. PsiQuantum does not currently publish a commercial cloud-access
  REST API, OpenAPI specification, or a general-purpose quantum-execution SDK
  comparable to those of gate-model quantum cloud providers — its public
  developer artifacts are confined to FTQC resource-estimation tooling and
  algorithm-design surfaces — and there is no public pricing or self-serve
  tier for the underlying quantum hardware.
